<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万潘云存储 - 提取中心</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1c29 0%, #2a2d3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #e2e8f0;
        }

        .container {
            background-color: #2d3142;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #4a5568;
        }

        h2 {
            color: #f7fafc;
            margin-bottom: 25px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #4a5568;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
            background-color: #1a202c;
            color: #e2e8f0;
            text-align: center;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Hide number input arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        button {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        #error-msg {
            color: #fc8181;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>验证提取码</h2>
        <input type="number" id="k" placeholder="4位数字" maxlength="4"
            oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)">
        <button onclick="v()">提取资料</button>
        <div id="error-msg">提取码错误或已失效</div>
    </div>

    <script>
        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function normalizeDomainUrl(domain) {
            if (/^https?:\/\//i.test(domain)) {
                return domain;
            }
            return 'https://' + domain;
        }

        function changeBackground(url) {
            return new URL(url).toString();
        }

        function pickTargetFromPayload(payload) {
            if (typeof payload === 'string') {
                return payload.trim();
            }

            var data = payload && payload.data ? payload.data : null;

            if (Array.isArray(data && data.backup_domains) && data.backup_domains.length > 0) {
                return pickRandom(data.backup_domains);
            }

            if (typeof (data && data.backup_domain) === 'string' && data.backup_domain.trim()) {
                return data.backup_domain.trim();
            }

            if (typeof (data && data.url) === 'string' && data.url.trim()) {
                return data.url.trim();
            }

            if (typeof payload.url === 'string' && payload.url.trim()) {
                return payload.url.trim();
            }

            return '';
        }

        async function getDomainFromLighthouse() {
            var controller = new AbortController();
            var timer = setTimeout(function () {
                controller.abort();
            }, 3000);
            var response;
            try {
                // 改用本地 API 接口，该接口通过 Service Binding 调用后台 Worker
                response = await fetch('/api/get-domain', {
                    cache: 'no-store',
                    signal: controller.signal
                });
            } finally {
                clearTimeout(timer);
            }
            if (!response.ok) {
                throw new Error('lighthouse unavailable');
            }

            var raw = await response.text();
            var payload;
            try {
                payload = JSON.parse(raw);
            } catch (_) {
                payload = raw;
            }

            var target = pickTargetFromPayload(payload);
            if (!target) {
                throw new Error('no domain found');
            }

            return normalizeDomainUrl(target);
        }

        // Rule: Sum of first 3 digits mod 10 == 4th digit
        async function v() {
            var i = document.getElementById('k').value;
            var e = document.getElementById('error-msg');

            if (i.length !== 4 || isNaN(i)) {
                e.style.display = 'block';
                return;
            }

            var s = 0;
            for (var j = 0; j < 3; j++) {
                s += parseInt(i.charAt(j), 10);
            }

            var c = s % 10;
            var r = c.toString();

            if (i.charAt(3) === r) {
                // Valid
                localStorage.setItem('_auth_token', Date.now());
                try {
                    var target = await getDomainFromLighthouse();
                    window.location.replace(changeBackground(target));
                } catch (_) {
                    e.style.display = 'block';
                }
            } else {
                // Invalid
                e.style.display = 'block';
            }
        }

        document.getElementById('k').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                v();
            }
        });
    </script>
</body>

</html>
