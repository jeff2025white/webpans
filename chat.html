<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>临时聊天室</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #d1d5db;
      --line: #374151;
      --accent: #22c55e;
      --accent-2: #16a34a;
      --warn: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg) 55%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.95));
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      transform: translateY(-11%);
    }

    .top {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 17px;
      font-weight: 700;
    }

    .meta {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--warn);
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.ok {
      background: var(--accent);
    }

    .messages {
      height: 56vh;
      min-height: 300px;
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(0, 0, 0, 0.15);
    }

    .msg {
      max-width: 80%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.45;
      word-break: break-word;
      font-size: 15px;
    }

    .msg.self {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #062c14;
      font-weight: 600;
    }

    .msg.peer {
      align-self: flex-start;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .msg.sys {
      align-self: center;
      max-width: 95%;
      color: var(--muted);
      background: transparent;
      border: 1px dashed var(--line);
      font-size: 13px;
    }

    .composer {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: flex;
      gap: 10px;
      background: var(--panel);
    }

    input[type="text"] {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1220;
      color: var(--text);
      padding: 12px;
      font-size: 15px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #4ade80;
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.2);
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #062c14;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 640px) {
      .messages {
        height: 58vh;
      }

      .msg {
        max-width: 90%;
      }

      .composer {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="title">临时双人聊天室</div>
      <div class="meta">
        <span id="room-badge" class="badge">房间: -</span>
        <span id="peer-count" class="badge">在线: 1</span>
        <span class="badge"><i id="status-dot" class="status-dot"></i><span id="status-text">连接中</span></span>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div class="composer">
      <input id="input" type="text" maxlength="1000" placeholder="输入消息，回车发送">
      <button id="send">发送</button>
    </div>
  </div>

  <script type="module">
    import { joinRoom } from 'https://esm.sh/trystero@0.20.1';

    const params = new URLSearchParams(location.search);
    let roomCode = (params.get('room') || params.get('code') || '').trim();

    if (!roomCode) {
      roomCode = prompt('请输入聊天室编码（如 abc123）:') || '';
      roomCode = roomCode.trim();
      if (!roomCode) {
        alert('未提供聊天室编码，页面将停止。');
        throw new Error('missing room code');
      }
      params.set('room', roomCode);
      history.replaceState(null, '', `${location.pathname}?${params.toString()}`);
    }

    roomCode = roomCode.slice(0, 64);

    const roomBadge = document.getElementById('room-badge');
    const peerCountEl = document.getElementById('peer-count');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    roomBadge.textContent = `房间: ${roomCode}`;

    const appId = 'webpans-temp-chat-v1';
    const room = joinRoom({ appId }, roomCode);
    const [sendMessage, getMessage] = room.makeAction('chat-message');

    const peers = new Set();

    function updatePeerCount() {
      peerCountEl.textContent = `在线: ${1 + peers.size}`;
      const connected = peers.size > 0;
      statusDot.classList.toggle('ok', connected);
      statusText.textContent = connected ? '已连接' : '等待对方加入';
    }

    function addMessage(kind, text) {
      const div = document.createElement('div');
      div.className = `msg ${kind}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    room.onPeerJoin((peerId) => {
      peers.add(peerId);
      updatePeerCount();
      addMessage('sys', '对方已加入聊天室');
    });

    room.onPeerLeave((peerId) => {
      peers.delete(peerId);
      updatePeerCount();
      addMessage('sys', '对方已离开聊天室');
    });

    getMessage((text) => {
      if (typeof text === 'string' && text.trim()) {
        addMessage('peer', text.trim());
      }
    });

    function sendCurrent() {
      const msg = inputEl.value.trim();
      if (!msg) return;
      sendMessage(msg);
      addMessage('self', msg);
      inputEl.value = '';
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendCurrent);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendCurrent();
      }
    });

    addMessage('sys', '聊天记录仅保留在当前页面内存，刷新后清空。');
    updatePeerCount();
  </script>
</body>

</html>
