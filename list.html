<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万潘云存储 - 节点列表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1c29 0%, #2a2d3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #e2e8f0;
        }

        .container {
            background-color: #2d3142;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 100%;
            border: 1px solid #4a5568;
        }

        h2 {
            color: #f7fafc;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 15px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            color: #a0aec0;
            padding: 20px;
        }

        .error {
            color: #fc8181;
            text-align: center;
            padding: 20px;
            background: rgba(252, 129, 129, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(252, 129, 129, 0.3);
            display: none;
        }

        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-item {
            margin-bottom: 15px;
        }

        .link-item a {
            display: block;
            padding: 15px 20px;
            background-color: #1a202c;
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: #e2e8f0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item a:after {
            content: "👉";
            position: absolute;
            right: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-item a:hover {
            background-color: #2d3748;
            border-color: #6366f1;
            color: #c7d2fe;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .link-item a:hover:after {
            opacity: 1;
            transform: translateX(0);
        }

        .logout-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #4a5568;
            border-radius: 20px;
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-color: #718096;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Unauthorized Message -->
        <div id="unauthorized-content" style="display: none; text-align: center; padding: 20px 0;">
            <div style="font-size: 60px; margin-bottom: 20px; line-height: 1;">🔒</div>
            <h2 style="border-bottom: none; margin-bottom: 15px;">访问受限</h2>
            <p style="color: #a0aec0; margin-bottom: 35px; font-size: 16px;">您需要先验证提取码才能查看节点列表。</p>
            <button onclick="window.location.href='index.html'"
                style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; padding: 12px 35px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; font-family: inherit; transition: all 0.3s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);">
                回到首页验证
            </button>
        </div>

        <!-- Main Content (Hidden initially) -->
        <div id="main-content" style="display: none;">
            <h2>🌐 万潘云存储节点池</h2>

            <div id="loading" class="loading" style="display: none;"></div>
            <div id="error" class="error" style="display: none;"></div>

            <ul id="links" class="link-list">
                <!-- Links will be injected here -->
            </ul>

            <button class="logout-btn" onclick="logout()">退出验证</button>
        </div>
    </div>

    <script>
        function checkAuth() {
            if (!localStorage.getItem('_auth_token')) {
                document.getElementById('unauthorized-content').style.display = 'block';
                return false;
            }
            document.getElementById('main-content').style.display = 'block';
            return true;
        }

        function logout() {
            localStorage.removeItem('_auth_token');
            window.location.href = 'index.html';
        }

        function renderDomains() {
            const listEl = document.getElementById('links');
            const domains = [
                'https://t3y4.cc.cd',
                'https://h4g5.us.ci',
                'https://k7m8.cc.cd'
            ];

            domains.forEach(url => {
                const li = document.createElement('li');
                li.className = 'link-item';

                const a = document.createElement('a');
                a.href = url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = url.replace(/https?:\/\//, '');

                li.appendChild(a);
                listEl.appendChild(li);
            });
        }

        // Check auth and start fetching when page loads
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                renderDomains();
            }
        });
    </script>
</body>

</html>
