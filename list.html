<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可用网址列表</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
        }

        h2 {
            color: #333;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 20px;
            background: #ffebee;
            border-radius: 8px;
            display: none;
        }

        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .link-item {
            margin-bottom: 15px;
        }

        .link-item a {
            display: block;
            padding: 15px 20px;
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            color: #495057;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-item a:after {
            content: "👉";
            position: absolute;
            right: 20px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-item a:hover {
            background-color: #fff;
            border-color: #8b5cf6;
            color: #8b5cf6;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
            transform: translateY(-2px);
        }

        .link-item a:hover:after {
            opacity: 1;
            transform: translateX(0);
        }

        .logout-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 20px;
            background: none;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #f5f5f5;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🌐 可用线路列表</h2>

        <div id="loading" class="loading">正在获取最新网址，请稍候...</div>
        <div id="error" class="error">获取网址失败，请稍后重试。</div>

        <ul id="links" class="link-list">
            <!-- Links will be injected here -->
        </ul>

        <button class="logout-btn" onclick="logout()">退出验证</button>
    </div>

    <script>
        // Check authentication
        if (!localStorage.getItem('_auth_token')) {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('_auth_token');
            window.location.href = 'index.html';
        }

        // Fetch data
        async function fetchDomains() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const listEl = document.getElementById('links');

            try {
                // To avoid CORS issues if this static page is on a different domain
                // We use standard fetch, assuming the lighthouse API supports CORS
                const response = await fetch('https://lighthouse.moea7a0159.ccwu.cc/');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                loadingEl.style.display = 'none';

                if (data && data.data && data.data.backup_domains && Array.isArray(data.data.backup_domains)) {
                    // Filter or normalize domains if needed
                    data.data.backup_domains.forEach(domain => {
                        // Ensure starts with http or https
                        const url = domain.startsWith('http') ? domain : `https://${domain}`;

                        const li = document.createElement('li');
                        li.className = 'link-item';

                        const a = document.createElement('a');
                        a.href = url;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = url.replace(/https?:\/\//, ''); // Display cleaner URL

                        li.appendChild(a);
                        listEl.appendChild(li);
                    });
                } else {
                    errorEl.textContent = "未找到可用线路信息";
                    errorEl.style.display = 'block';
                }

            } catch (error) {
                console.error('Fetch error:', error);
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
            }
        }

        // Start fetching when page loads
        document.addEventListener('DOMContentLoaded', fetchDomains);
    </script>
</body>

</html>
